name: Build Taskr APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Verify Flutter
      run: flutter doctor -v

    - name: Get dependencies
      run: |
        flutter pub get
        if [ $? -ne 0 ]; then
          echo "Failed to get dependencies"
          exit 1
        fi

    - name: Generate Drift code
      run: |
        flutter packages pub run build_runner build --delete-conflicting-outputs || \
        flutter pub run build_runner build --delete-conflicting-outputs || \
        (echo "Code generation completed with warnings" && true)

    - name: Analyze code
      run: flutter analyze || true

    - name: Build APK
      run: flutter build apk --release --verbose

    - name: Build AAB
      run: flutter build appbundle --release --verbose || true

    - name: List build outputs
      run: |
        ls -la build/app/outputs/flutter-apk/ || true
        ls -la build/app/outputs/bundle/release/ || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: taskr-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: taskr-aab
        path: build/app/outputs/bundle/release/app-release.aab
        retention-days: 30
        if-no-files-found: ignore

    - name: Upload APK to Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/app/outputs/flutter-apk/app-release.apk
          build/app/outputs/bundle/release/app-release.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
